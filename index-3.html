<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambala Clock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1A1C">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    width: 100%;
    background: #0E1A1C;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #13262A;
    border: 1px solid #1F3B40;
    border-radius: 4px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
  }
  .bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    background: #D98E2B;
    transition: width 1s linear;
    width: 0%;
  }
  .label {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7FA39A;
    margin-bottom: 28px;
  }
  .time-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    color: #F4EFE6;
    line-height: 1;
  }
  .hm { font-size: 76px; font-weight: 700; }
  .colon { font-size: 76px; font-weight: 700; color: #D98E2B; }
  .sec { font-size: 30px; font-weight: 600; color: #7FA39A; margin-left: 4px; min-width: 38px; }
  .date {
    margin-top: 20px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    color: #C9CFC6;
    border-top: 1px solid #1F3B40;
    padding-top: 16px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="bar" id="bar"></div>
    <div class="label">Ambala &middot; IST &middot; UTC+5:30</div>
    <div class="time-row">
      <span class="hm" id="hour">00</span>
      <span class="colon">:</span>
      <span class="hm" id="minute">00</span>
      <span class="sec" id="second">:00</span>
    </div>
    <div class="date" id="dateStr">Loading...</div>
  </div>

<script>
  const TIMEZONE = "Asia/Kolkata";

  function update() {
    const now = new Date();

    const timeParts = new Intl.DateTimeFormat("en-GB", {
      timeZone: TIMEZONE,
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    }).formatToParts(now);

    const map = {};
    timeParts.forEach(p => map[p.type] = p.value);

    const dateStr = new Intl.DateTimeFormat("en-IN", {
      timeZone: TIMEZONE,
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    }).format(now);

    document.getElementById("hour").textContent = map.hour;
    document.getElementById("minute").textContent = map.minute;
    document.getElementById("second").textContent = ":" + map.second;
    document.getElementById("dateStr").textContent = dateStr;

    const secNum = Number(map.second);
    document.getElementById("bar").style.width = (secNum / 59 * 100) + "%";
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
